<!DOCTYPE html>
<html>
  <body>
    <h3>If vulnerable, this will send a cross-origin request with credentials to help.crypto.com</h3>
    <script>
      fetch("https://help.crypto.com/cdn-cgi/rum?", {
        method: "POST",
        credentials: "include",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ test: "cors-test" })
      })
      .then(() => {
        document.body.innerHTML += "<p>Request completed — check browser console for CORS error.</p>";
      })
      .catch(e => {
        document.body.innerHTML += "<p>Error: " + e + "</p>";
      });
    </script>
  </body>
</html>
